<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE STORE - تشكيلة التيشرتات الحصرية</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans pb-20">

    <header class="bg-blue-900 p-6 shadow-2xl text-white text-center border-b-4 border-yellow-500 flex flex-col items-center">
        <h1 class="text-4xl font-bold text-yellow-500 tracking-wide">ELITE STORE</h1>
    </header>

    <main class="max-w-5xl mx-auto p-4">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-8" id="products"></div>

        <section class="mt-12 bg-white p-6 rounded-3xl shadow-xl border border-blue-100">
            <h2 class="text-2xl font-bold mb-6 text-blue-900">🛒 عربة التسوق</h2>
            <div id="cart-items" class="space-y-4 mb-6"></div>
            <div class="font-bold text-xl border-t pt-4 text-blue-900 flex justify-between">
                <span>الإجمالي:</span>
                <span><span id="total-price">0</span> ج.م</span>
            </div>
        </section>

        <section class="mt-8 p-8 bg-blue-900 rounded-3xl shadow-2xl">
            <h2 class="text-white text-xl font-bold mb-4 text-center">بيانات الشحن</h2>
            <div class="flex flex-col gap-4">
                <input type="text" id="name" placeholder="الاسم الكريم" class="w-full p-4 rounded-xl">
                <input type="text" id="address" placeholder="عنوان التوصيل" class="w-full p-4 rounded-xl">
                <button onclick="sendToWhatsApp()" class="bg-yellow-500 text-blue-900 py-4 rounded-xl font-bold text-lg hover:bg-yellow-400">تأكيد الطلب عبر واتساب 💬</button>
            </div>
        </section>
    </main>

    <script>
        const products = [
            {name: 'تيشرت "Green is Soothing"', price: 450, desc: 'تصميم عصري.', img: 'تشيرتات كاجوال.jpeg'},
            {name: 'تيشرت كرستيانو (أبيض)', price: 450, desc: 'تصميم رياضي عصري.', img: 'ابيض كرستيانو.jfif'},
            {name: 'تيشرت الأرجنتين', price: 450, desc: 'ألوان السماوي المميزة.', img: 'ارجنتين.jfif'},
            {name: 'تيشرت إيطاليا', price: 450, desc: 'تيشرت رياضي بألوان إيطاليا.', img: 'اطاليا.jfif'},
            {name: 'تيشرت البرازيل', price: 450, desc: 'خامة ليكرا مستوردة.', img: 'برازيل.jfif'},
            {name: 'تيشرت برشلونة', price: 550, desc: 'تيشرت بولو فخم.', img: 'برشلونا.jfif'},
            {name: 'تيشرت ريال مدريد', price: 450, desc: 'خامة رياضية عالية الجودة.', img: 'ريال مدريد.jfif'},
            {name: 'تيشرت كرستيانو (أسود)', price: 450, desc: 'إصدار خاص باللون الأسود.', img: 'كرستيانو اسود.jfif'}
        ];

        let cart = [];
        let total = 0;

        const container = document.getElementById('products');
        products.forEach((p, index) => {
            container.innerHTML += `
            <div class="bg-white rounded-3xl shadow-lg border-b-4 border-blue-900 overflow-hidden">
                <img src="${p.img}" class="w-full h-56 object-cover">
                <div class="p-6">
                    <h3 class="text-xl font-bold text-blue-900">${p.name}</h3>
                    <p class="text-gray-500 text-sm my-2">${p.desc}</p>
                    <select id="size-${index}" class="w-full p-2 mb-3 border rounded-lg">
                        <option>اختر المقاس: S, M, L, XL, XXL</option>
                        <option value="S">S</option><option value="M">M</option><option value="L">L</option><option value="XL">XL</option><option value="XXL">XXL</option>
                    </select>
                    <div class="flex justify-between items-center">
                        <span class="text-2xl font-bold text-yellow-600">${p.price} ج.م</span>
                        <button onclick="addToCart(${p.price}, '${p.name}', 'size-${index}')" class="bg-blue-900 text-white px-4 py-2 rounded-xl font-bold">أضف للسلة</button>
                    </div>
                </div>
            </div>`;
        });

        function addToCart(price, name, sizeId) {
            let size = document.getElementById(sizeId).value;
            if(size.includes("اختر المقاس")) { alert("يرجى اختيار المقاس أولاً!"); return; }
            cart.push({name, price, size});
            total += price;
            updateUI();
        }

        function updateUI() {
            document.getElementById('total-price').innerText = total;
            document.getElementById('cart-items').innerHTML = cart.map((item, index) => 
                `<div class="flex justify-between p-3 bg-gray-50 rounded-xl">
                    <span class="font-bold text-blue-900">${item.name} (${item.size})</span>
                    <button onclick="total -= ${item.price}; cart.splice(${index},1); updateUI()" class="text-red-500 font-bold">✕</button>
                </div>`).join('');
        }

        function sendToWhatsApp() {
            let name = document.getElementById('name').value;
            let address = document.getElementById('address').value;
            if(!name || !address || cart.length === 0) { alert("أكمل البيانات والسلة!"); return; }
            let phoneNumber = "201009717040"; 
            let msg = `طلب جديد من ELITE STORE:%0Aالاسم: ${name}%0Aالعنوان: ${address}%0A%0Aالطلبات:%0A`;
            cart.forEach(i => msg += `- ${i.name} (مقاس: ${i.size}) - ${i.price} ج.م%0A`);
            window.open(`https://wa.me/${phoneNumber}?text=${msg}`);
        }
    </script>
</body>
</html>
